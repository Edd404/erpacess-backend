# render.yaml — Configuração de deploy automático no Render
# Coloque este arquivo na raiz do repositório do backend

services:
  - type: web
    name: iphone-store-api
    env: node
    region: oregon          # Mais próximo do Brasil com menor latência
    plan: free              # Plano gratuito
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /api/v1/health

    # Variáveis de ambiente — preencha no dashboard do Render
    # NÃO coloque valores secretos aqui, apenas as chaves
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_VERSION
        value: v1
      - key: DATABASE_URL
        sync: false          # Preencher manualmente no Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM_NAME
        value: iPhone Store
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: VIACEP_BASE_URL
        value: https://viacep.com.br/ws
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: AUTH_RATE_LIMIT_MAX
        value: "10"
      - key: LOG_LEVEL
        value: info
